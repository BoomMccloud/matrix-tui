<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Agent Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #24292e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 1px 3px rgba(27,31,35,0.12);
        }
        h1 {
            font-size: 20px;
            margin: 0 0 8px 0;
        }
        .version {
            font-size: 14px;
            color: #586069;
            margin-bottom: 24px;
        }
        .components {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .component {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-top: 1px solid #f6f8fa;
        }
        .component:first-child {
            border-top: none;
        }
        .status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .online {
            background-color: #28a745;
            box-shadow: 0 0 4px #28a745;
        }
        .offline {
            background-color: #6a737d;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Matrix Agent</h1>
        <div class="version">Version 0.1.0</div>
        <ul class="components">
            <li class="component">
                <span>Matrix Client</span>
                <span class="status online"></span>
            </li>
            <li class="component">
                <span>GitHub Webhook</span>
                <span class="status online"></span>
            </li>
            <li class="component">
                <span>Sandbox Manager</span>
                <span class="status online"></span>
            </li>
            <li class="component">
                <span>Task Runner</span>
                <span class="status offline"></span>
            </li>
        </ul>
    </div>
</body>
</html>
